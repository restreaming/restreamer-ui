<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="{{description}}" />
		<meta name="author" content="datarhei restreamer" />
		<title>{{name}}</title>
		<link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
		<link
			rel="alternate"
			type="application/json+oembed"
			href="channels/{{channelid}}/oembed.json"
			title="{{name}}"
		/>
		<link
			rel="alternate"
			type="text/xml+oembed"
			href="channels/{{channelid}}/oembed.xml"
			title="{{name}}"
		/>
		<script src="channels/{{channelid}}/config.js"></script>
		<!-- Video.js v10 via CDN -->
		<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video.js"></script>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video/skin.css" />
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
			video-player {
				display: block;
				width: 100%;
				height: 100%;
			}
			video-skin {
				--media-brand-color: #eaea05;
				--media-color-primary: #eaea05;
			}
			/* Logo overlay */
			.vjs-logo-overlay {
				position: absolute;
				z-index: 10;
				max-width: 20%;
				max-height: 20%;
				pointer-events: none;
			}
			.vjs-logo-overlay a { display: inline-block; pointer-events: all; }
			.vjs-logo-overlay img { max-width: 100%; max-height: 100%; display: block; }
			.vjs-logo-overlay.top-left     { top: 8px; left: 8px; }
			.vjs-logo-overlay.top-right    { top: 8px; right: 8px; }
			.vjs-logo-overlay.bottom-left  { bottom: 8px; left: 8px; }
			.vjs-logo-overlay.bottom-right { bottom: 8px; right: 8px; }
		</style>
	</head>
	<body>
		<video-player id="player">
			<video-skin>
				<video
					src=""
					playsinline
				></video>
			</video-skin>
		</video-player>

		<script>
			function getQueryParam(key, defaultValue) {
				var query = window.location.search.substring(1);
				var vars = query.split('&');
				for (var i = 0; i < vars.length; i++) {
					var pair = vars[i].split('=');
					if (pair[0] == key) {
						return pair[1];
					}
				}
				return defaultValue;
			}

			function convertBoolParam(key, defaultValue) {
				var val = getQueryParam(key, defaultValue);
				return (
					val === true ||
					val === 'true' ||
					val === '1' ||
					val === 'yes' ||
					val === 'on'
				);
			}

			function convertColorParam(parameter, defaultColor) {
				var re = new RegExp('^#([0-9a-f]{3}|[0-9a-f]{6})$');
				var c = getQueryParam(parameter, defaultColor);
				var c = decodeURIComponent(c);
				if (!String(c).startsWith('#')) c = '#' + c;
				if (re.test(c)) {
					return c;
				} else {
					return defaultColor;
				}
			}

			var autoplay = convertBoolParam('autoplay', playerConfig.autoplay);
			var mute = convertBoolParam('mute', playerConfig.mute);
			var color = convertColorParam('color', playerConfig.color.buttons);

			// Apply brand color from config/query param
			var skin = document.querySelector('video-skin');
			if (skin && color) {
				skin.style.setProperty('--media-brand-color', color);
				skin.style.setProperty('--media-color-primary', color);
			}

			// Set up the video source (HLS)
			var videoEl = document.querySelector('video-player video');
			if (videoEl) {
				// Append origin for cast device compatibility
				videoEl.src = window.location.origin + '/' + playerConfig.source;
				if (playerConfig.poster && playerConfig.poster.length > 0) {
					videoEl.poster = playerConfig.poster + '?t=' + String(new Date().getTime());
				}
				if (mute) {
					videoEl.muted = true;
				}
				if (autoplay) {
					videoEl.muted = true;
					videoEl.autoplay = true;
				}
			}

			// Logo overlay
			if (playerConfig.logo && playerConfig.logo.image && playerConfig.logo.image.length > 0) {
				var player = document.getElementById('player');
				var logoDiv = document.createElement('div');
				logoDiv.className = 'vjs-logo-overlay ' + (playerConfig.logo.position || 'top-left');

				var img = document.createElement('img');
				img.src = playerConfig.logo.image + '?' + Math.random();
				img.alt = '';

				if (playerConfig.logo.link && playerConfig.logo.link.length > 0) {
					var a = document.createElement('a');
					a.href = playerConfig.logo.link;
					a.target = '_blank';
					a.rel = 'noopener noreferrer';
					a.appendChild(img);
					logoDiv.appendChild(a);
				} else {
					logoDiv.appendChild(img);
				}

				// video-player uses position:relative internally; overlay on top
				player.style.position = 'relative';
				player.appendChild(logoDiv);
			}
		</script>
	</body>
</html>
